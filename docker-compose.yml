services:
  grpc_rtsp:
    build:
      context: .
      dockerfile: Dockerfile
    image: grpc_rtsp_server
    container_name: grpc_rtsp_server
    # 注意：使用 bind mount 挂载宿主机 /dev/shm/<SHM_NAMESPACE> 后，
    # 容器内 /dev/shm 实际容量由宿主机 /dev/shm 决定。如需调整请在宿主机执行：
    #   mount -o remount,size=32G /dev/shm
    volumes:
      # 项目级 SHM 隔离：支持通过 SHM_NAMESPACE 环境变量将共享内存文件隔离到
      # /dev/shm/<SHM_NAMESPACE>/ 下，避免同一宿主机多个项目之间的 stream_id 冲突。
      # 首次部署前请确保宿主机目录已创建：
      #   mkdir -p /dev/shm/${SHM_NAMESPACE:-grpc_rtsp}
      # 与 include 本文件的外部项目保持 namespace 一致，双方通过 /dev/shm/{stream_id} 交互。
      - /dev/shm/${SHM_NAMESPACE:-grpc_rtsp}:/dev/shm
      # 开发/调试：直接挂载本地编译好的二进制和入口脚本，避免每次修改都重建镜像
      - ./workspace:/app/
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "50051:50051"
    stdin_open: true
    tty: true
    restart: unless-stopped
