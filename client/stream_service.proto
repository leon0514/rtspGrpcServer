syntax = "proto3";

package streamingservice;

// 定义支持的解码器类型
enum DecoderType {
    DECODER_CPU_FFMPEG = 0;   // 默认：使用 CPU OpenCV 解码
    DECODER_GPU_NVCUVID = 1;     // 预留：使用 Nvidia CUDA 硬件解码
    DECODER_HIK_SDK = 2;      // 海康 SDK 直接抓图
}

// 流连接状态
enum StreamStatus {
    STATUS_CONNECTING = 0;    // 连接中
    STATUS_CONNECTED = 1;     // 已连接
    STATUS_DISCONNECTED = 2;  // 无法连接
    STATUS_NOT_FOUND = 3;     // 不存在
}

service RTSPStreamService {
    rpc StartStream (StartRequest) returns (StartResponse);
    rpc StopStream (StopRequest) returns (StopResponse);
    rpc GetLatestFrame (FrameRequest) returns (FrameResponse);
    rpc StreamFrames (StreamRequest) returns (stream FrameResponse);  // 流式传输
    rpc CheckStream (CheckRequest) returns (CheckResponse);
    rpc ListStreams (ListStreamsRequest) returns (ListStreamsResponse);  // 查询所有流
    rpc UpdateStream (UpdateStreamRequest) returns (UpdateStreamResponse);  // 更新流信息
    rpc GetShmLayout (ShmLayoutRequest) returns (ShmLayoutResponse);  // 获取共享内存布局信息
}

message StartRequest {
    string rtsp_url = 1;
    int32 heartbeat_timeout_ms = 2; 
    int32 decode_interval_ms = 3;   
    DecoderType decoder_type = 4;    // 指定解码器类型
    int32 gpu_id = 5;                // GPU ID，仅对 GPU 解码有效，默认 0
    bool keep_on_failure = 6;        // 打开失败时是否保留任务，默认 false（即自动删除）
    bool use_shared_mem = 7; // 是否写入共享内存
    bool only_key_frames = 8; // 是否只解码关键帧
}

message StartResponse {
    bool success = 1;
    string stream_id = 2;
    string message = 3;
}

message StopRequest {
    string stream_id = 1;
}

message StopResponse {
    bool success = 1;
    string message = 2;
}

message FrameRequest {
    string stream_id = 1;
}

message StreamRequest {
    string stream_id = 1;
    int32 max_fps = 2;  // 最大帧率，0 表社不限制
}

message FrameResponse {
    bool success = 1;
    bytes image_data = 2;
    string message = 3;
    int64 frame_seq = 4;
}

// 查询所有流请求
message ListStreamsRequest {
    // 可扩展：未来可加过滤条件
}

// 单个流的信息
message StreamInfo {
    string stream_id = 1;          // 流 ID
    string rtsp_url = 2;           // RTSP 地址
    StreamStatus status = 3;       // 连接状态
    DecoderType decoder_type = 4;  // 解码器类型
    int32 width = 5;               // 视频宽度
    int32 height = 6;              // 视频高度
    int32 decode_interval_ms = 7;  // 解码间隔
    int32 heartbeat_timeout_ms = 8;
    bool keep_on_failure = 9;
    bool only_key_frames = 10;
    bool use_shared_mem = 11;
}

message CheckRequest {
    string stream_id = 1;
}

message CheckResponse {
    StreamInfo stream = 1;
    string message = 2;
}

// 查询所有流响应
message ListStreamsResponse {
    int32 total_count = 1;         // 流总数
    repeated StreamInfo streams = 2;  // 流列表
}

message UpdateStreamRequest {
  string stream_id = 1;
  string new_rtsp_url = 2;
}

message UpdateStreamResponse {
  bool success = 1;
  string message = 2;
}

message ShmLayoutInfo {
    uint64 slot_count = 1;        // 每路流槽位数
    uint64 max_frame_bytes = 2;   // 单帧最大字节数
    uint64 alignment = 3;         // 内存对齐字节数
    uint64 slot_size = 4;         // 单个槽位总字节数（含对齐填充）
    uint64 seq_offset = 5;        // sequence 在槽位内的偏移
    uint64 meta_offset = 6;       // ShmMeta 在槽位内的偏移
    uint64 payload_offset = 7;    // payload 在槽位内的偏移
    uint64 meta_data_size = 8;    // ShmMeta 实际数据大小（非对齐后）
    uint64 head_idx_offset = 9;   // head_idx 在整段 SHM 中的偏移
    uint64 total_size = 10;       // 整段 SHM 总字节数
}

message ShmLayoutRequest {
    // 空请求，布局信息与具体流无关
}

message ShmLayoutResponse {
    bool success = 1;
    string message = 2;
    ShmLayoutInfo layout = 3;
}