syntax = "proto3";

package streamingservice;

// 定义支持的解码器类型
enum DecoderType {
    DECODER_CPU_FFMPEG = 0;   // 默认：使用 CPU OpenCV 解码
    DECODER_GPU_NVCUVID = 1;     // 预留：使用 Nvidia CUDA 硬件解码
}

// 流连接状态
enum StreamStatus {
    STATUS_CONNECTING = 0;    // 连接中
    STATUS_CONNECTED = 1;     // 已连接
    STATUS_DISCONNECTED = 2;  // 无法连接
    STATUS_NOT_FOUND = 3;     // 不存在
}

service RTSPStreamService {
    rpc StartStream (StartRequest) returns (StartResponse);
    rpc StopStream (StopRequest) returns (StopResponse);
    rpc GetLatestFrame (FrameRequest) returns (FrameResponse);
    rpc StreamFrames (StreamRequest) returns (stream FrameResponse);  // 流式传输
    rpc CheckStream (CheckRequest) returns (CheckResponse);
    rpc ListStreams (ListStreamsRequest) returns (ListStreamsResponse);  // 查询所有流
}

message StartRequest {
    string rtsp_url = 1;
    int32 heartbeat_timeout_ms = 2; 
    int32 decode_interval_ms = 3;   
    DecoderType decoder_type = 4;    // 指定解码器类型
    int32 gpu_id = 5;                // GPU ID，仅对 GPU 解码有效，默认 0
    bool keep_on_failure = 6;        // 打开失败时是否保留任务，默认 false（即自动删除）
    bool use_shared_mem = 7; // 是否写入共享内存
}

message StartResponse {
    bool success = 1;
    string stream_id = 2;
    string message = 3;
}

message StopRequest {
    string stream_id = 1;
}

message StopResponse {
    bool success = 1;
    string message = 2;
}

message FrameRequest {
    string stream_id = 1;
}

message StreamRequest {
    string stream_id = 1;
    int32 max_fps = 2;  // 最大帧率，0 表社不限制
}

message FrameResponse {
    bool success = 1;
    bytes image_data = 2;
    string message = 3;
}

message CheckRequest {
    string stream_id = 1;
}

message CheckResponse {
    StreamStatus status = 1;   // 连接状态
    string message = 2;        // 状态消息
    string rtsp_url = 3;       // RTSP 地址
    DecoderType decoder_type = 4;  // 解码器类型
    int32 width = 5;           // 视频宽度
    int32 height = 6;          // 视频高度
    int32 decode_interval_ms = 7;  // 解码间隔
}

// 查询所有流请求
message ListStreamsRequest {
    // 可扩展：未来可加过滤条件
}

// 单个流的信息
message StreamInfo {
    string stream_id = 1;          // 流 ID
    string rtsp_url = 2;           // RTSP 地址
    StreamStatus status = 3;       // 连接状态
    DecoderType decoder_type = 4;  // 解码器类型
    int32 width = 5;               // 视频宽度
    int32 height = 6;              // 视频高度
    int32 decode_interval_ms = 7;  // 解码间隔
}

// 查询所有流响应
message ListStreamsResponse {
    int32 total_count = 1;         // 流总数
    repeated StreamInfo streams = 2;  // 流列表
}